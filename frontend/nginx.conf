server {
    listen 80;
    client_max_body_size 20m;

    # Static SPA
    root /usr/share/nginx/html;
    index index.html;

    # Django REST API
    location /api/       { proxy_pass http://backend:8000; include /etc/nginx/proxy_params.conf; }
    location /admin/     { proxy_pass http://backend:8000; include /etc/nginx/proxy_params.conf; }
    location /static/    { proxy_pass http://backend:8000; include /etc/nginx/proxy_params.conf; }
    location /media/     { proxy_pass http://backend:8000; include /etc/nginx/proxy_params.conf; }

    # Contact-form mail microservice
    location /contact-api/ { proxy_pass http://mail:4000; include /etc/nginx/proxy_params.conf; }

    # WebSockets (Channels) — needs the upgrade headers
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # SPA fallback — every other path serves index.html
    location / { try_files $uri $uri/ /index.html; }
}
