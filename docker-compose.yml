# SkillTree AI — full stack. Copy .env.example to .env and fill secrets first.
# Then:  docker compose up -d --build
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: skilltree
      POSTGRES_USER: skilltree
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skilltree}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skilltree"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data

  backend:
    build: ./backend
    env_file: .env
    environment:
      DEBUG: "False"
      DATABASE_URL: postgres://skilltree:${POSTGRES_PASSWORD:-skilltree}@db:5432/skilltree
      REDIS_URL: redis://redis:6379/0
      MAIL_SERVICE_URL: http://mail:4000
      # LM Studio runs on the host machine, not in a container:
      LM_STUDIO_URL: ${LM_STUDIO_URL:-http://host.docker.internal:1234/v1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - media:/app/media
      - static:/app/staticfiles
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }

  worker:
    build: ./backend
    command: celery -A core worker --loglevel=info
    env_file: .env
    environment:
      DEBUG: "False"
      DATABASE_URL: postgres://skilltree:${POSTGRES_PASSWORD:-skilltree}@db:5432/skilltree
      REDIS_URL: redis://redis:6379/0
      LM_STUDIO_URL: ${LM_STUDIO_URL:-http://host.docker.internal:1234/v1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - media:/app/media
      # Code executor: worker runs `docker run` on the HOST daemon. The sandbox
      # path must be identical inside and outside the container, so bind-mount
      # host /tmp/skilltree at the same path (SANDBOX_BASE in executor/services.py).
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/skilltree:/tmp/skilltree
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }

  beat:
    build: ./backend
    command: celery -A core beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgres://skilltree:${POSTGRES_PASSWORD:-skilltree}@db:5432/skilltree
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis: { condition: service_started }

  mail:
    build:
      context: ./backend
      dockerfile: Dockerfile.mail
    env_file: .env

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
      - mail

volumes:
  pgdata:
  redisdata:
  media:
  static:
